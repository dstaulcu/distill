name: Bug report
description: Report something that's broken in Distill.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Most reports turn out to
        already be fixed in a newer release, so please confirm your version
        before filing.

        Your installed version is shown in the sidebar's **❓ Help** menu.
        The latest release is listed at
        https://github.com/dstaulcu/distill/releases

  - type: input
    id: version
    attributes:
      label: Distill version
      description: The version shown in the sidebar's ❓ Help menu.
      placeholder: e.g. 4.0.0
    validations:
      required: true

  - type: checkboxes
    id: latest-release
    attributes:
      label: Latest release confirmation
      options:
        - label: >-
            I've checked the Releases page and confirmed the version above is
            the latest release, and I can still reproduce this bug on it.
          required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a page and click Summarize
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: input
    id: firefox-version
    attributes:
      label: Firefox version
      placeholder: e.g. 128.0
    validations:
      required: false
